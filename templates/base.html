<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>{% block title %}Energia Industrial{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% block refresh %}{% endblock %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#eef2f7;color:#111827}
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:#fff;border-right:1px solid #e5e7eb;padding:28px 24px;box-shadow:4px 0 22px rgba(15,23,42,.06)}
.logo{display:flex;align-items:center;gap:12px;font-size:27px;color:#2563eb;font-weight:800;margin-bottom:36px}.logo span{font-size:28px}
.menu a{display:flex;align-items:center;gap:12px;text-decoration:none;color:#374151;padding:13px 14px;border-radius:12px;font-weight:600;margin-bottom:8px;transition:.2s}
.menu a:hover,.menu a.active{background:#eff6ff;color:#2563eb}
.main{margin-left:260px;padding:34px}
.hero{background:linear-gradient(135deg,#2563eb,#0891b2,#16a34a);color:white;padding:34px 38px;border-radius:24px;margin-bottom:28px;box-shadow:0 16px 35px rgba(37,99,235,.25)}
.hero h1{font-size:34px;letter-spacing:.5px;margin-bottom:8px}.hero p{font-size:17px;opacity:.94}
.grid-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px}
.kpi-card,.card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 12px 28px rgba(15,23,42,.07);border:1px solid #e5e7eb}
.kpi-card small{color:#6b7280;font-size:14px;font-weight:600}.kpi-card strong{display:block;font-size:27px;margin-top:10px}
.tag{display:inline-block;margin-top:12px;background:#dcfce7;color:#166534;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
.card-title{font-size:24px;margin-bottom:18px;font-weight:800}.form-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
input,select{width:100%;padding:13px;border:1px solid #d1d5db;border-radius:12px;font-size:15px;background:white}
button{border:none;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn-primary{background:#2563eb;color:white}.btn-primary:hover{background:#1d4ed8}.btn-danger{background:#fee2e2;color:#991b1b}.btn-danger:hover{background:#fecaca}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse}th{text-align:left;background:#f3f4f6;padding:14px;color:#374151;font-size:14px}td{padding:14px;border-bottom:1px solid #e5e7eb;font-size:14px}tr:hover td{background:#f9fafb}
.badge{display:inline-block;padding:7px 12px;border-radius:999px;background:#dcfce7;color:#166534;font-size:12px;font-weight:800}.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-orange{background:#ffedd5;color:#c2410c}
.machine-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}.machine-card{background:white;border-radius:22px;padding:24px;border:1px solid #e5e7eb;box-shadow:0 12px 28px rgba(15,23,42,.07)}
.machine-header{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px}.machine-header h2{font-size:25px}
.mini-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.mini-kpi{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;padding:16px}.mini-kpi small{color:#64748b;font-weight:700}.mini-kpi strong{display:block;margin-top:7px;font-size:22px}
.footer-note{margin-top:18px;color:#6b7280;font-size:13px}
@media(max-width:1100px){.grid-kpi,.machine-grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.sidebar{position:relative;width:100%;height:auto}.main{margin-left:0;padding:22px}.grid-kpi,.machine-grid,.mini-kpis,.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="sidebar">
    <div class="logo"><span>⚡</span> Energia</div>
    <div class="menu">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">📊 Dashboard</a>
        <a href="/maquinas" class="{% if request.path == '/maquinas' %}active{% endif %}">🏭 Máquinas</a>
        <a href="/medicoes" class="{% if request.path == '/medicoes' %}active{% endif %}">🔌 Medições</a>
        <a href="/indicadores" class="{% if request.path == '/indicadores' %}active{% endif %}">🌱 Indicadores</a>
    </div>
    <p class="footer-note">Sistema IoT para monitoramento energético, sustentabilidade e eficiência industrial.</p>
</div>
<div class="main">{% block content %}{% endblock %}</div>
</body>
</html>
